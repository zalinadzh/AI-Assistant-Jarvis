<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .core {
            width: 200px; height: 200px;
            border: 5px solid #00f2ff;
            border-radius: 50%;
            box-shadow: 0 0 50px #00f2ff, inset 0 0 50px #00f2ff;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 80px #00f2ff; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="core"></div>
</body>
</html>
